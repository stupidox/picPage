<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>图片</title>
</head>
<body>
<h1 style="text-align: center"></h1>
<select id="dirPath" placeholder="文件夹...">
    <option value="E:\private\pics">E:\private\pics</option>
    <option value="D:\private\pictures">D:\private\pictures</option>
    <option value="F:\aiPics">F:\aiPics</option>
</select>
<div id="dirList"></div>
<div id="picList"></div>
<div id="dirList2"></div>
</body>
<script type="text/javascript" src="/js/jquery/jquery-3.7.1.min.js"></script>
<script type="text/javascript" src="/js/common.js"></script>
<script type="text/javascript" src="/js/jquery/jquery-confirm.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/all.css">
<link rel="stylesheet" type="text/css" href="/css/jquery-confirm.min.css">
<script type="text/javascript">
    let outter = '0';
    let timer;
    // 设置键盘翻页
    $(document).keyup(function(event){
        if (event.keyCode === 37) {
            $(".pre").click();
        } else if (event.keyCode === 39) {
            $(".next").click();
        }
    });

    // 反向排序img
    function reversePics() {
        $('#picList').append(
            $('#picList .img-container').get().reverse()
        );
    }

    // 删除次目录下的所有文件
    function deleteDir() {
        $.confirm({
            title: '删除',
            content: '确认删除该目录下的所有文件!',
            boxWidth: '400px',
            useBootstrap: false,
            onOpenBefore: function () {
                if (outter === '1') {
                    $('.jconfirm-box').css('width', '80%');
                    $('.jconfirm-buttons').css('width', '90%')
                    $('.jconfirm-buttons button').css('width', '45%').css('height', '70px')
                }
            },
            buttons: {
                '确认': function () {
                    const params = new URLSearchParams(window.location.search);
                    const path = encode(params.get('path'));
                    const dir = encode(params.get('dir'));
                    let rootPath = encode(params.get('rootPath'));
                    $.ajax({
                        type: "GET",
                        contentType: "application/json",
                        url: "/comic/deleteDir",
                        data: {path: path, dir: dir, rootPath: rootPath},
                        dataType: 'json',
                        success: function (data) {
                            if ($('.j-next').length > 0) {
                                $('.j-next').get(0).click()
                            } else if ($('.j-pre').length > 0) {
                                $('.j-pre').get(0).click()
                            } else {
                                $('#goDir').get(0).click()
                            }
                        },
                        error: function (e) {
                        }
                    });
                },
                '取消': function () {

                }
            }
        });
    }

    // 移动到000下最后一个文件夹后
    function moveDir() {
        $.confirm({
            title: '一定',
            content: '确认移动该目录下的所有文件!',
            boxWidth: '400px',
            useBootstrap: false,
            onOpenBefore: function () {
                if (outter === '1') {
                    $('.jconfirm-box').css('width', '80%');
                    $('.jconfirm-buttons').css('width', '90%')
                    $('.jconfirm-buttons button').css('width', '45%').css('height', '70px')
                }
            },
            buttons: {
                '确认': function () {
                    const params = new URLSearchParams(window.location.search);
                    const path = encode(params.get('path'));
                    const dir = encode(params.get('dir'));
                    let rootPath = encode(params.get('rootPath'));
                    $.ajax({
                        type: "GET",
                        contentType: "application/json",
                        url: "/comic/moveDir",
                        data: {path: path, dir: dir, rootPath: rootPath},
                        dataType: 'json',
                        success: function (data) {
                            if ($('.j-next').length > 0) {
                                $('.j-next').get(0).click()
                            } else if ($('.j-pre').length > 0) {
                                $('.j-pre').get(0).click()
                            } else {
                                $('#goDir').get(0).click()
                            }
                        },
                        error: function (e) {
                        }
                    });
                },
                '取消': function () {

                }
            }
        });
    }

    let currentRequestId = 0; // 任务令牌，点击按钮后停止加载img

    function getPathInfo(rootPath, dir, path) {
        $.ajax({
            type: "GET",
            contentType: "application/json",
            url: "/comic/pic",
            data: {path: path, dir: dir, rootPath: rootPath},
            dataType: 'json',
            success: function (data) {
                let parentName = getParentName(dir);
                let pParentPath = getPParentPath(dir);
                let dirInfo = '';

                dirInfo += '<div class="follow-div">'
                if (dir != null && dir !== '' && parentName !== pParentPath) {
                    dirInfo += '<a id="goDir" lastPage="' + path + '" href="./pics.html?path=' + encode(parentName) + '&rootPath=' + encode(rootPath)
                    dirInfo += '&dir=' + encode(pParentPath) + '">目录</a>';
                } else if (dir != null && dir !== '' && parentName === pParentPath){
                    dirInfo += '<a id="goDir" lastPage="' + path + '" href="./pics.html?path=' + encode(parentName) + '&rootPath=' + encode(rootPath)
                    dirInfo += '&dir=">目录</a>';
                } else {
                    dirInfo += '<a id="goDir" lastPage="' + path + '" href="./pics.html?path=&rootPath=' + encode(rootPath)
                    dirInfo += '&dir=">目录</a>';
                }
                // 图片倒序排列
                if (typeof(data.fileList) != "undefined") {
                    dirInfo += '<div><a id="reversePics" href="javascript:void(0)" onclick="reversePics()" >倒序</a></div>';
                }
                // 000同级目录下可移动
                if (typeof(data.fileList) != "undefined" && data.fName === '000') {
                    dirInfo += '<div><a id="moveDir" href="javascript:void(0)" onclick="moveDir()" >移动</a></div>';
                }
                dirInfo += '<div><a id="delDir" href="javascript:void(0)" onclick="deleteDir()" >删除</a></div>'
                dirInfo += '</div>';
                if (data.pre !== undefined && data.pre != null && data.pre !== '') {
                    dirInfo += '<a class="jump j-pre" data-j="./pics.html?path=' + encode(data.pre) + '&dir=' + encode(dir) +
                        '&rootPath='+ encode(rootPath) + '"><button class="button mid pre">上一章</button></a>'
                }
                if (data.next !== undefined && data.next != null && data.next !== '') {
                    dirInfo += '<a class="jump j-next" data-j="./pics.html?path=' + encode(data.next) + '&dir=' + encode(dir) +
                        '&rootPath='+ encode(rootPath) + '"><button class="button mid next">下一章</button></a>'
                }
                if (typeof(data.dirList) != "undefined") {
                    // 目录列表
                    for (let i = 0; i < data.dirList.length; i++) {
                        dirInfo += '<a class="name" href="javascript:void(0)" data-p="' + data.dirList[i] + '">'
                            + data.dirList[i] + '</a><div style="next"></div>';
                    }
                }
                $('#dirList').html(dirInfo);

                // 加载图片
                if (typeof(data.fileList) != "undefined") {
                    let allPaths = data.fileList;
                    let batchIndex = 0;
                    let batchSize = 6;
                    let isLoading = false;

                    // 【删除】不再需要全局的 loadedImagesCache 和 nextRenderIndex
                    // 因为每批次的缓存和渲染状态应该是独立的，或者我们可以用一个全局大缓存，但渲染指针局部化。
                    // 为了最简单且不出错，我们保留一个全局的大缓存对象，但渲染指针局部化。
                    let globalImageCache = {};

                    function loadBatch() {
                        // 【关键】每次启动新批次（无论是初始化还是递归），都记录当前的“任务快照ID”
                        // 注意：这里不要 ++currentRequestId，而是读取当前的值赋给局部变量
                        // 因为一个完整的页面加载过程（多批次）应该共享同一个 ID，直到用户手动切换
                        const myRequestId = currentRequestId;

                        if (batchIndex >= allPaths.length || isLoading) {
                            return;
                        }

                        isLoading = true;
                        let currentBatch = allPaths.slice(batchIndex, batchIndex + batchSize);
                        let loadedCount = 0;
                        const totalInThisBatch = currentBatch.length;

                        if (totalInThisBatch === 0) {
                            isLoading = false;
                            return;
                        }

                        // 【关键修改 1】：在当前批次内，定义“下一个要渲染的全局索引”
                        // 它初始化为当前批次的起始索引 (batchIndex)
                        let nextRenderIndex = batchIndex;

                        // 【新增】按顺序渲染的辅助函数
                        // 【关键修改 2】：定义 renderInOrder 在 loadBatch 内部，让它能访问局部的 nextRenderIndex
                        function renderInOrder() {
                            const picList = document.getElementById('picList');

                            // 循环检查：只要全局缓存里有 nextRenderIndex 对应的数据，就插入
                            while (globalImageCache.hasOwnProperty(nextRenderIndex)) {
                                const item = globalImageCache[nextRenderIndex];

                                if (item) {
                                    picList.appendChild(item);
                                }

                                // 处理完这个索引，清理缓存，指针后移
                                delete globalImageCache[nextRenderIndex];
                                nextRenderIndex++;
                            }

                            // 可选：如果这一批全部渲染完了，且是最后一批，可以触发 initCotent
                            // 这里的逻辑可以根据你的需求微调
                        }

                        // 获取当前页面的 origin，用于构建绝对路径，防止相对路径解析歧义
                        const pageOrigin = window.location.origin;

                        currentBatch.forEach(function(picPath, index) {
                            // 【关键修改 3】：计算全局绝对索引
                            const globalIndex = batchIndex + index;

                            let img = new Image();

                            // --- 路径构建 (保持不变) ---
                            let currentDir = (typeof dir !== 'undefined' && dir) ? dir : '';
                            let currentPath = (typeof path !== 'undefined' && path) ? path : '';
                            let relativePath = '';
                            if (currentDir && currentPath) {
                                relativePath = '/' + currentDir + '/' + currentPath + '/' + picPath;
                            } else if (currentPath) {
                                relativePath = '/' + currentPath + '/' + picPath;
                            } else {
                                relativePath = '/' + picPath;
                            }
                            // 确保路径以 / 开头，然后拼接 origin 变成绝对路径
                            // 例如：http://localhost:8080/images/1.jpg
                            // 绝对路径能避免浏览器对相对路径的多次解析尝试
                            let fullPath = relativePath.startsWith('/') ? (pageOrigin + relativePath) : (pageOrigin + '/' + relativePath);
                            // 去除可能出现的双斜杠 (如 http://...//images)
                            fullPath = fullPath.replace(/([^:]\/)\/+/g, "$1");

                            // --- 2. 定义处理函数 (带指纹锁) ---
                            // 使用 fullPath 作为指纹，确保即使函数被调用多次，也是针对同一个资源
                            const processImage = function(status) {
                                // 【🛑 核心拦截点】
                                // 如果当前的全局 ID 变了，说明用户点了下一页/切换目录
                                // 此时直接返回，不执行任何渲染、缓存、计数逻辑
                                if (myRequestId !== currentRequestId) {
                                    return;
                                }

                                // 【指纹锁】检查是否已经处理过这个特定的 img 对象
                                if (img._processed) return;
                                img._processed = true;

                                if (status === 'load') {
                                    // 避免使用对资源类型对象使用包装
                                    // let $img = $(img); $img.addClass(...); $container.append($img);
                                    // jquery包装img，造成图片2次请求
                                    // 只有当图片已经存在于 HTML 中，或者已经通过上面的步骤成功插入到页面后
                                    // 再去 $('img') 选中它做动画、事件绑定等操作，才是安全的。
                                    const container = document.createElement('div');
                                    container.className = 'img-container';
                                    const overlay = document.createElement('div');
                                    overlay.className = 'overlay';
                                    overlay.textContent = '删除';
                                    container.appendChild(overlay);

                                    if (data.out === '1') {
                                        img.classList.add('picOut');
                                    }
                                    container.appendChild(img);

                                    // 【关键修改 4】：存入全局缓存，Key 是 globalIndex
                                    globalImageCache[globalIndex] = container;
                                } else {
                                    console.warn('图片加载失败:', picPath);
                                    globalImageCache[globalIndex] = null; // 占位
                                }

                                loadedCount++;

                                // 当本批次所有图片都尝试加载完毕后，尝试渲染
                                if (loadedCount === totalInThisBatch) {
                                    // 再次检查，防止最后一张图加载完时用户刚好切换了
                                    if (myRequestId !== currentRequestId) return;

                                    renderInOrder(); // 调用内部的 renderInOrder，它会自动处理局部变量 nextRenderIndex

                                    isLoading = false;
                                    batchIndex += batchSize;

                                    if (batchIndex < allPaths.length) {
                                        setTimeout(loadBatch, 50);
                                    } else {
                                        // 所有批次都结束了
                                        initCotent();
                                    }
                                }
                            };

                            img.onload = function() { processImage('load'); };
                            img.onerror = function() { processImage('error'); };
                            img.src = fullPath;
                        });
                    }

                    // 启动
                    loadBatch();
                }

                dirInfo = '';
                if (data.pre !== undefined && data.pre != null && data.pre !== '') {
                    dirInfo += '<a class="jump j-pre" data-j="./pics.html?path=' + encode(data.pre) + '&dir=' + encode(dir)
                        +'&rootPath=' + encode(rootPath) + '"><button class="button mid">上一章</button></a>'
                }
                if (data.next !== undefined && data.next != null && data.next !== '') {
                    dirInfo += '<a class="jump j-next" data-j="./pics.html?path=' + encode(data.next) + '&dir=' + encode(dir)
                        +'&rootPath='+ encode(rootPath) + '"><button class="button mid">下一章</button></a>'
                }
                $('#dirList2').html(dirInfo);
                if (data.out === '1') {
                    $('#goDir').addClass('aOut');
                    $('#delDir').addClass('aOut');
                    $('#reversePics').addClass('aOut');
                    $('#moveDir').addClass('aOut');
                    $('#dirPath').addClass('selectOut');
                    $('.button').addClass('buttonOut');
                    $('.name').addClass('dOut')
                    outter = '1'
                }

                $(".jump").click(function(){
                    // 1. 【🛑 立即让旧任务失效】
                    // 只要这个值变了，上面所有正在加载的 img 的回调都会发现 ID 不匹配，从而自动停止工作
                    currentRequestId++;

                    window.location.href = $(this).data('j');
                });

                $(".name").click(function(){
                    const subPath = $(this).data("p")
                    let rpath;
                    if (dir == null || dir === ''){
                        rpath = path;
                    } else {
                        rpath = dir + '\\' + path
                    }
                    $.ajax({
                        type: "GET",
                        contentType: "application/json",
                        url: "/comic/pathInfo",
                        data: {path: encode(subPath), dir: encode(rpath)},
                        dataType: 'json',
                        success: function (data1) {
                            window.location.href = './pics.html?path=' + encode(data1.path) + '&rootPath=' + encode(rootPath)
                                + '&dir=' + encode(data1.dir)
                        },
                        error: function (e) {
                        }
                    });
                });

            },
            error: function (e) {
            }
        });
    }

    // 目录切换
    function openDir() {
        // 1. 【🛑 立即让旧任务失效】
        // 只要这个值变了，上面所有正在加载的 img 的回调都会发现 ID 不匹配，从而自动停止工作
        currentRequestId++;

        const val = encode($('#dirPath').val());
        getPathInfo(val, null, null)
    }

    // 初始化页面
    $(function (){
        const params = new URLSearchParams(window.location.search);
        const path = encode(params.get('path'));
        const dir = encode(params.get('dir'));
        let rootPath = encode(params.get('rootPath'));
        if (rootPath != null && rootPath !== "") {
            rootPath = rootPath.replaceAll("/", "\\");
            $('#dirPath').val(rootPath);
        } else {
            $('#dirPath').val('E:\\private\\pics');
            rootPath = "E:\\private\\pics";
        }
        if (path != null && path !== '') {
            $('h1').html(path);
            $('title').html(path);
        } else {
            $('h1').html(dir);
        }
        $('#dirPath').on('change', openDir);
        getPathInfo(rootPath, dir, path);
    })

    // 页面内容加载后的方法
    function initCotent(){
        // 长按图片能删除图片
        $('.img-container').on('mousedown', function (){
            const t = $(this);
            timer = setTimeout(function (){
                t.find('.overlay').fadeIn(10);
            }, 700)
        });

        $('.img-container').on('mouseup', function (){
            const t = $(this);
            if ($(this).find('.overlay').is(':visible')) {
                setTimeout(function () {
                    t.find('.overlay').fadeOut(10);
                }, 2300)
            }
            clearTimeout(timer);
        })

        $('.img-container').on('touchstart', function (){
            const t = $(this);
            timer = setTimeout(function (){
                t.find('.overlay').fadeIn(10);
            }, 700)
        });

        $('.img-container').on('touchend', function (){
            const t = $(this);
            if ($(this).find('.overlay').is(':visible')) {
                setTimeout(function () {
                    t.find('.overlay').fadeOut(10);
                }, 2300)
            }
            clearTimeout(timer);
        });

        // 删除图片
        $('.overlay').on('click', function (){
            const src = encode($(this).next().attr('src'));
            const t = $(this);
            $.confirm({
                title: '删除',
                content: '确认删除该图片!',
                boxWidth: '400px',
                useBootstrap: false,
                onOpenBefore: function () {
                    if (outter === '1') {
                        $('.jconfirm-box').css('width', '80%');
                        $('.jconfirm-buttons').css('width', '90%')
                        $('.jconfirm-buttons button').css('width', '45%').css('height', '70px')
                    }
                },
                buttons: {
                    '确认': function () {
                        const params = new URLSearchParams(window.location.search);
                        let rootPath = encode(params.get('rootPath'));
                        $.ajax({
                            type: "GET",
                            contentType: "application/json",
                            url: "/comic/deletePic",
                            data: {rootPath: rootPath, loc: src},
                            dataType: 'json',
                            success: function (data) {
                                t.parent().remove();
                            },
                            error: function (e) {
                            }
                        });
                    },
                    '取消': function () {

                    }
                }
            });
        });
    }

    // 再页面卸载时记录滚动位置
    $(window).on('beforeunload', function (){
        // 获取当前的滚动位置
        const scrollPosition = $(window).scrollTop();
        // 将滚动位置存储到localStorage
        localStorage.setItem('scrollPosition', scrollPosition)
    })

</script>
</html>
