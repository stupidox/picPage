<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>图片</title>
</head>
<body>
    <h1 style="text-align: center"></h1>
    <select id="dirPath" placeholder="文件夹...">
        <option value="E:\private\pics">E:\private\pics</option>
        <option value="D:\private\pictures">D:\private\pictures</option>
        <option value="F:\aiPics">F:\aiPics</option>
    </select>
    <div id="dirList"></div>
    <div id="picList"></div>
    <div id="dirList2"></div>
</body>
<script type="text/javascript" src="/js/jquery/jquery-3.7.1.min.js"></script>
<script type="text/javascript" src="/js/common.js"></script>
<script type="text/javascript" src="/js/jquery/jquery-confirm.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/all.css">
<link rel="stylesheet" type="text/css" href="/css/jquery-confirm.min.css">
<script type="text/javascript">
    let outter = '0';
    let timer;
    // 设置键盘翻页
    $(document).keyup(function(event){
        if (event.keyCode === 37) {
            $(".pre").click();
        } else if (event.keyCode === 39) {
            $(".next").click();
        }
    });

    // 反向排序img
    function reversePics() {
        $('#picList').append(
            $('#picList .img-container').get().reverse()
        );
    }

    // 删除次目录下的所有文件
    function deleteDir() {
        $.confirm({
            title: '删除',
            content: '确认删除该目录下的所有文件!',
            boxWidth: '400px',
            useBootstrap: false,
            onOpenBefore: function () {
                if (outter === '1') {
                    $('.jconfirm-box').css('width', '80%');
                    $('.jconfirm-buttons').css('width', '90%')
                    $('.jconfirm-buttons button').css('width', '45%').css('height', '70px')
                }
            },
            buttons: {
                '确认': function () {
                    const params = new URLSearchParams(window.location.search);
                    const path = encode(params.get('path'));
                    const dir = encode(params.get('dir'));
                    let rootPath = encode(params.get('rootPath'));
                    $.ajax({
                        type: "GET",
                        contentType: "application/json",
                        url: "/comic/deleteDir",
                        data: {path: path, dir: dir, rootPath: rootPath},
                        dataType: 'json',
                        success: function (data) {
                            if ($('.j-next').length > 0) {
                                $('.j-next').get(0).click()
                            } else if ($('.j-pre').length > 0) {
                                $('.j-pre').get(0).click()
                            } else {
                                $('#goDir').get(0).click()
                            }
                        },
                        error: function (e) {
                        }
                    });
                },
                '取消': function () {

                }
            }
        });
    }

    // 移动到000下最后一个文件夹后
    function moveDir() {
        $.confirm({
            title: '一定',
            content: '确认移动该目录下的所有文件!',
            boxWidth: '400px',
            useBootstrap: false,
            onOpenBefore: function () {
                if (outter === '1') {
                    $('.jconfirm-box').css('width', '80%');
                    $('.jconfirm-buttons').css('width', '90%')
                    $('.jconfirm-buttons button').css('width', '45%').css('height', '70px')
                }
            },
            buttons: {
                '确认': function () {
                    const params = new URLSearchParams(window.location.search);
                    const path = encode(params.get('path'));
                    const dir = encode(params.get('dir'));
                    let rootPath = encode(params.get('rootPath'));
                    $.ajax({
                        type: "GET",
                        contentType: "application/json",
                        url: "/comic/moveDir",
                        data: {path: path, dir: dir, rootPath: rootPath},
                        dataType: 'json',
                        success: function (data) {
                            if ($('.j-next').length > 0) {
                                $('.j-next').get(0).click()
                            } else if ($('.j-pre').length > 0) {
                                $('.j-pre').get(0).click()
                            } else {
                                $('#goDir').get(0).click()
                            }
                        },
                        error: function (e) {
                        }
                    });
                },
                '取消': function () {

                }
            }
        });
    }

    let currentRequestId = 0; // 任务令牌，点击按钮后停止加载img

    // 辅助函数：构建 URL，避免重复代码
    function buildUrl(basePath, params) {
        const queryString = Object.keys(params)
            // 【修改点 1】：移除 filter，或者只过滤 null/undefined，保留空字符串 ''
            // 如果业务上连 null/undefined 都想变成空字符串显示，可以连 filter 都去掉，直接在 map 里处理
            .filter(key => params[key] !== null && params[key] !== undefined)
            .map(key => `${key}=${encode(params[key])}`)
            .join('&');
        return `${basePath}?${queryString}`;
    }

    function getPathInfo(rootPath, dir, path) {
        // 显示加载状态（可选，提升体验）
        $('#picList').html('<div class="loading">加载中...</div>');

        $.ajax({
            type: "GET",
            contentType: "application/json",
            url: "/comic/pic",
            data: {path: path, dir: dir, rootPath: rootPath},
            dataType: 'json',
            success: function (data) {
                renderNavigation(data, rootPath, dir, path);

                if (typeof data.fileList !== "undefined" && data.fileList.length > 0) {
                    startImageLoading(data.fileList, data.out, rootPath, dir, path);
                } else {
                    $('#picList').html('<div class="empty-tip">该目录下暂无图片</div>');
                }

                renderBottomNav(data, rootPath, dir);
                applyOutterStyle(data.out);
                bindEvents(rootPath, dir, path);
            },
            error: function (e) {
                console.error("加载失败", e);
                $('#picList').html('<div class="error-tip">加载失败，请重试</div>');
            }
        });
    }

    // --- 分离：渲染顶部导航 ---
    function renderNavigation(data, rootPath, dir, path) {
        let parentName = getParentName(dir);
        let pParentPath = getPParentPath(dir);
        let html = ['<div class="follow-div">'];

        // 目录按钮逻辑简化

        // 如果 dir 为空或已经是根，targetDir 保持空字符串
        // 计算 targetDir 和 targetPath
        let targetDir = '';
        let targetPath = parentName; // 默认是 parentName

        // 还原原来的逻辑判断
        if (dir != null && dir !== '') {
            if (parentName === pParentPath) {
                // 对应原代码的 else if: path=parentName, dir= (空)
                targetDir = '';
                targetPath = parentName;
            } else if (parentName !== pParentPath) {
                // 对应原代码的 if: path=parentName, dir=pParentPath
                targetDir = pParentPath;
                targetPath = parentName;
            }
        } else {
            // 对应原代码的 else: path= (空), dir= (空)
            // 注意：原代码这里 path 也是空的
            targetDir = '';
            targetPath = '';
        }

        // 生成链接
        // 结果会是：./pics.html?path=xxx&rootPath=xxx&dir=yyy
        // 或者：./pics.html?path=&rootPath=xxx&dir= (完美还原空值效果)
        html.push(`<a id="goDir" lastPage="${path}" href="${buildUrl('./pics.html', {
            path: targetPath,
            rootPath: rootPath,
            dir: targetDir
        })}">目录</a>`);

        if (typeof data.fileList !== "undefined" && data.fileList.length > 0) {
            html.push('<div><a id="reversePics" href="javascript:void(0)" onclick="reversePics()">倒序</a></div>');
        }
        if (data.fName === '000') {
            html.push('<div><a id="moveDir" href="javascript:void(0)" onclick="moveDir()">移动</a></div>');
        }

        html.push('<div><a id="delDir" href="javascript:void(0)" onclick="deleteDir()">删除</a></div></div>');

        // 上下章按钮
        if (data.pre) {
            html.push(`<a class="jump j-pre" data-j="${buildUrl('./pics.html', { path: data.pre, dir: dir, rootPath: rootPath })}"><button class="button mid pre">上一章</button></a>`);
        }
        if (data.next) {
            html.push(`<a class="jump j-next" data-j="${buildUrl('./pics.html', { path: data.next, dir: dir, rootPath: rootPath })}"><button class="button mid next">下一章</button></a>`);
        }

        // 文件夹列表 (优化点：移除无用的 style="next" div)
        if (typeof data.dirList !== "undefined" && data.dirList.length > 0) {
            data.dirList.forEach(item => {
                html.push(`<div style="next"><a class="name" href="javascript:void(0)" data-p="${item}">${item}</a></div>`);
            });
        }

        $('#dirList').html(html.join(''));
    }

    // --- 分离：渲染底部导航 ---
    function renderBottomNav(data, rootPath, dir) {
        let html = [];
        if (data.pre) {
            html.push(`<a class="jump j-pre" data-j="${buildUrl('./pics.html', { path: data.pre, dir: dir, rootPath: rootPath })}"><button class="button mid">上一章</button></a>`);
        }
        if (data.next) {
            html.push(`<a class="jump j-next" data-j="${buildUrl('./pics.html', { path: data.next, dir: dir, rootPath: rootPath })}"><button class="button mid">下一章</button></a>`);
        }
        $('#dirList2').html(html.join(''));
    }

    // --- 分离：应用样式 ---
    function applyOutterStyle(out) {
        if (out === '1') {
            $('#goDir, #delDir, #reversePics, #moveDir, #dirPath').addClass('aOut');
            $('.button').addClass('buttonOut');
            $('.name').addClass('dOut');
            window.outter = '1';
        }
    }

    // --- 核心：图片加载逻辑 (抽离出来，更清晰) ---
    function startImageLoading(allPaths, outFlag, rootPath, dir, path) {
        const batchSize = 6;
        let batchIndex = 0;
        let isLoading = false;
        const globalImageCache = {};
        let nextRenderIndex = 0;

        // 捕获当前的 Request ID，整个加载过程共享这个 ID
        const myRequestId = ++currentRequestId;

        const picList = document.getElementById('picList');
        if (!picList) return;
        picList.innerHTML = ''; // 清空之前的 loading 或旧图

        // 按顺序渲染的辅助函数
        // 定义 renderInOrder 在 loadBatch 内部，让它能访问局部的 nextRenderIndex
        function renderInOrder() {
            // 循环检查：只要全局缓存里有 nextRenderIndex 对应的数据，就插入
            while (globalImageCache.hasOwnProperty(nextRenderIndex)) {
                const item = globalImageCache[nextRenderIndex];
                if (item) picList.appendChild(item);
                // 处理完这个索引，清理缓存，指针后移
                delete globalImageCache[nextRenderIndex];
                nextRenderIndex++;
            }
        }

        function loadBatch() {
            if (batchIndex >= allPaths.length || isLoading) return;

            // 再次检查 ID，防止在 setTimeout 期间用户切换了页面
            if (myRequestId !== currentRequestId) return;

            isLoading = true;
            const currentBatch = allPaths.slice(batchIndex, batchIndex + batchSize);
            let loadedCount = 0;
            const totalInThisBatch = currentBatch.length;

            if (totalInThisBatch === 0) {
                isLoading = false;
                return;
            }

            // 获取当前页面的 origin，用于构建绝对路径，防止相对路径解析歧义
            const pageOrigin = window.location.origin;

            const currentDir = (typeof dir !== 'undefined' && dir) ? dir : '';
            const currentPath = (typeof path !== 'undefined' && path) ? path : '';

            currentBatch.forEach((picPath, index) => {
                // 计算全局绝对索引
                const globalIndex = batchIndex + index;

                const img = new Image();

                // 路径构建逻辑简化
                let relativePath = '/';
                if (currentDir && currentPath) relativePath += `${currentDir}/${currentPath}/`;
                else if (currentPath) relativePath += `${currentPath}/`;
                relativePath += picPath;

                // 规范化 URL
                // 确保路径以 / 开头，然后拼接 origin 变成绝对路径
                // 例如：http://localhost:8080/images/1.jpg
                // 绝对路径能避免浏览器对相对路径的多次解析尝试
                let fullPath = pageOrigin + (relativePath.startsWith('/') ? relativePath : '/' + relativePath);
                // 去除可能出现的双斜杠 (如 http://...//images)
                fullPath = fullPath.replace(/([^:]\/)\/+/g, "$1");

                // --- 定义处理函数 (带指纹锁) ---
                // 使用 fullPath 作为指纹，确保即使函数被调用多次，也是针对同一个资源
                const processImage = (status) => {
                    // 🛑 核心拦截：如果 ID 不匹配，直接丢弃
                    if (myRequestId !== currentRequestId) return;
                    // 【指纹锁】检查是否已经处理过这个特定的 img 对象
                    if (img._processed) return;
                    img._processed = true;

                    if (status === 'load') {
                        // 避免使用对资源类型对象使用包装
                        // let $img = $(img); $img.addClass(...); $container.append($img);
                        // jquery包装img，造成图片2次请求
                        // 只有当图片已经存在于 HTML 中，或者已经通过上面的步骤成功插入到页面后
                        // 再去 $('img') 选中它做动画、事件绑定等操作，才是安全的。
                        const container = document.createElement('div');
                        container.className = 'img-container';

                        const overlay = document.createElement('div');
                        overlay.className = 'overlay';
                        overlay.textContent = '删除';
                        container.appendChild(overlay);

                        if (outFlag === '1') img.classList.add('picOut');
                        container.appendChild(img);

                        globalImageCache[globalIndex] = container;
                    } else {
                        console.warn('图片加载失败:', picPath);
                        globalImageCache[globalIndex] = null;
                    }

                    loadedCount++;

                    // 当本批次所有图片都尝试加载完毕后，尝试渲染
                    if (loadedCount === totalInThisBatch) {
                        // 再次检查，防止最后一张图加载完时用户刚好切换了
                        if (myRequestId !== currentRequestId) {
                            isLoading = false;
                            return;
                        }
                        renderInOrder();
                        isLoading = false;
                        batchIndex += batchSize;

                        if (batchIndex < allPaths.length) {
                            setTimeout(loadBatch, 50);
                        } else {
                            // 所有批次都结束了
                            initCotent();
                        }
                    }
                };

                img.onload = () => processImage('load');
                img.onerror = () => processImage('error');
                img.src = fullPath;
            });
        }

        loadBatch();
    }

    // --- 分离：事件绑定 ---
    function bindEvents(rootPath, dir, path) {
        // 上下章点击
        // 使用 .off('click').on('click') 防止事件重复绑定（如果 getPathInfo 被多次调用而不刷新页面）
        $(".jump").off('click').on('click', function() {
            // 1. 立即失效旧任务
            currentRequestId++;
            // 2. 视觉反馈：立即清空图片区，显示加载中
            $('#picList').html('<div class="loading">正在跳转...</div>');
            // 3. 跳转
            window.location.href = $(this).data('j');
        });

        // 文件夹点击
        $(".name").off('click').on('click', function() {
            const subPath = $(this).data("p");
            // 视觉反馈
            $('#picList').html('<div class="loading">进入目录...</div>');

            let rpath = (dir == null || dir === '') ? path : (dir + '\\' + path);

            $.ajax({
                type: "GET",
                contentType: "application/json",
                url: "/comic/pathInfo",
                data: { path: encode(subPath), dir: encode(rpath) },
                dataType: 'json',
                success: function (data1) {
                    // 这里不需要手动 ++currentRequestId，因为页面即将刷新或重新调用 getPathInfo
                    // 如果是单页应用不刷新，则需要在这里 ++currentRequestId
                    window.location.href = buildUrl('./pics.html', {
                        path: data1.path,
                        rootPath: rootPath,
                        dir: data1.dir
                    });
                },
                error: function (e) {
                    $('#picList').html('<div class="error-tip">目录信息获取失败</div>');
                }
            });
        });
    }

    // 目录切换
    function openDir() {
        // 1. 【🛑 立即让旧任务失效】
        // 只要这个值变了，上面所有正在加载的 img 的回调都会发现 ID 不匹配，从而自动停止工作
        currentRequestId++;

        const val = encode($('#dirPath').val());
        getPathInfo(val, null, null)
    }

    // 初始化页面
    $(function (){
        const params = new URLSearchParams(window.location.search);
        const path = encode(params.get('path'));
        const dir = encode(params.get('dir'));
        let rootPath = encode(params.get('rootPath'));
        if (rootPath != null && rootPath !== "") {
            rootPath = rootPath.replaceAll("/", "\\");
            $('#dirPath').val(rootPath);
        } else {
            $('#dirPath').val('E:\\private\\pics');
            rootPath = "E:\\private\\pics";
        }
        if (path != null && path !== '') {
            $('h1').html(decode(path));
            $('title').html(decode(path));
        } else {
            $('h1').html(decode(dir));
        }
        $('#dirPath').on('change', openDir);
        getPathInfo(rootPath, dir, path);
    })

    // 图片加载后的方法
    function initCotent(){
        // 长按图片能删除图片
        $('.img-container').on('mousedown', function (){
            const t = $(this);
            timer = setTimeout(function (){
                t.find('.overlay').fadeIn(10);
            }, 700)
        });

        $('.img-container').on('mouseup', function (){
            const t = $(this);
            if ($(this).find('.overlay').is(':visible')) {
                setTimeout(function () {
                    t.find('.overlay').fadeOut(10);
                }, 2300)
            }
            clearTimeout(timer);
        })

        $('.img-container').on('touchstart', function (){
            const t = $(this);
            timer = setTimeout(function (){
                t.find('.overlay').fadeIn(10);
            }, 700)
        });

        $('.img-container').on('touchend', function (){
            const t = $(this);
            if ($(this).find('.overlay').is(':visible')) {
                setTimeout(function () {
                    t.find('.overlay').fadeOut(10);
                }, 2300)
            }
            clearTimeout(timer);
        });

        // 删除图片
        $('.overlay').on('click', function (){
            const src = encode($(this).next().attr('src'));
            const t = $(this);
            $.confirm({
                title: '删除',
                content: '确认删除该图片!',
                boxWidth: '400px',
                useBootstrap: false,
                onOpenBefore: function () {
                    if (outter === '1') {
                        $('.jconfirm-box').css('width', '80%');
                        $('.jconfirm-buttons').css('width', '90%')
                        $('.jconfirm-buttons button').css('width', '45%').css('height', '70px')
                    }
                },
                buttons: {
                    '确认': function () {
                        const params = new URLSearchParams(window.location.search);
                        let rootPath = encode(params.get('rootPath'));
                        $.ajax({
                            type: "GET",
                            contentType: "application/json",
                            url: "/comic/deletePic",
                            data: {rootPath: rootPath, loc: src},
                            dataType: 'json',
                            success: function (data) {
                                t.parent().remove();
                            },
                            error: function (e) {
                            }
                        });
                    },
                    '取消': function () {

                    }
                }
            });
        });
    }

    // 再页面卸载时记录滚动位置
    $(window).on('beforeunload', function (){
        // 获取当前的滚动位置
        const scrollPosition = $(window).scrollTop();
        // 将滚动位置存储到localStorage
        localStorage.setItem('scrollPosition', scrollPosition)
    })

</script>
</html>
