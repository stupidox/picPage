<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>图片</title>
</head>
<body>
    <!-- 定义一个 label，for 属性指向 select 的 id -->
    <label for="dirPath">选择文件夹：</label>
    <select id="dirPath">
        <option value="pics">E:盘</option>
        <option value="pictures">D盘</option>
        <option value="aiPics">F盘</option>
    </select>
    <h1 style="text-align: center"></h1>
    <div id="dirList"></div>
    <div id="picList"></div>
    <div id="dirList2"></div>
</body>
<script type="text/javascript" src="/js/common.js"></script>
<link rel="stylesheet" type="text/css" href="/css/all.css">

<!-- 现在 (本地) -->
<link rel="stylesheet" href="/css/sweetalert2/sweetalert2.min.css">
<script type="text/javascript" src="/js/sweetalert2/sweetalert2.js"></script>

<!-- 模板：定义好结构，数据用占位符 (或者留空让 JS 填) -->
<!-- 注意：template 里的内容浏览器不会显示，也不会执行里面的脚本 -->
<!-- dirList内容 -->
<template id="tpl-dir-link">
    <div class="follow-div">
        <!-- 这里先写死结构，id 可以不要，因为克隆后会有新的 -->
        <a class="btn-go-dir" lastPage="">目录</a>
        <!-- 动态区域：倒序 -->
        <div>
            <a class="btn-reverse-pics">倒序</a>
        </div>
        <!-- 动态区域：移动 -->
        <div>
            <a class="btn-move-dir" >移动</a>
        </div>
        <div>
            <a class="btn-del-dir">删除</a>
        </div>
    </div>
    <a class="a-j-pre"><button class="bt-j-pre">上一章</button></a>
    <a class="a-j-next"><button class="bt-j-next">下一章</button></a>
</template>
<template id="tpl-dir2-link">
    <a class="a-j-pre"><button class="bt-j-pre">上一章</button></a>
    <a class="a-j-next"><button class="bt-j-next">下一章</button></a>
</template>
<script type="text/javascript">
    let outter = '0';
    let timer;
    let currentRequestId = 0; // 任务令牌，点击按钮后停止加载img
    let canDown = true;
    let canUp = false;
    // 文件映射
    const fileMap = '/files/';

    // 设置键盘翻页
    document.addEventListener('keyup', function (event) {
        if (event.code === '37') {
            const btn = document.querySelector('.pre');
            if (btn) {
                btn.click();
            }
        } else if (event.code === '39') {
            const btn = document.querySelector('.next');
            if (btn) {
                btn.click();
            }
        }
    });

    // 反向排序img
    function reversePics(e, target) {
        const picList = document.getElementById('picList');
        if (picList) {
            // 1. 获取所有 .img-container 元素 (返回的是 HTMLCollection，需转为数组)
            const items = Array.from(picList.querySelectorAll('.img-container'));

            // 2. 反转数组
            items.reverse();

            // 3. 重新追加 (DOM 特性：appendChild 已存在的元素会将其移动到新位置)
            items.forEach(item => {
                picList.appendChild(item);
            });
        }
    }

    // 删除次目录下的所有文件
    function delDir(e, target) {
        Swal.fire({
            title: '删除',
            text: '确认删除该目录下的所有文件!',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '确认',
            cancelButtonText: '取消',
            confirmButtonColor: '#d33',

            // 核心变化：动态设置样式
            // 如果 outter 为 '1'，应用自定义宽类名；否则使用默认
            // customClass: {
            //     popup: outter === '1' ? 'swal-wide-popup' : ''
            // },

            // 如果需要完全通过 JS 控制宽度而不想写 CSS 类，也可以用 width 选项，但 customClass 更灵活
            width: outter === '1' ? '80%' : undefined,

            preConfirm: () => {
                // 获取 URL 参数
                const params = new URLSearchParams(window.location.search);

                const path = encode(params.get('path'));
                const dir = encode(params.get('dir'));
                let rootPath = encode(params.get('rootPath'));

                // 使用原生 fetch 替代 $.ajax
                return fetch(`/comic/deleteDir?path=${path}&dir=${dir}&rootPath=${rootPath}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('网络响应不正常');
                            }
                            return response.json();
                        })
                        .then(async(data) => {
                            if (!data.ok || data.ok !== '1') {
                                return data;
                            }
                            // 成功回调逻辑
                            // 模拟原代码的按钮点击逻辑
                            if (document.querySelectorAll('.j-next').length > 0) {
                                const el = document.querySelector('.j-next');
                                const rootPath = encode(el.dataset.rootPath);
                                const dir = encode(el.dataset.dir);
                                const path = encode(el.dataset.path);

                                const data = await getPathInfo(rootPath, dir, path);
                                repalceState(data, rootPath, dir, path);
                            } else if (document.querySelectorAll('.j-pre').length > 0) {
                                const el = document.querySelector('.j-pre');
                                const rootPath = encode(el.dataset.rootPath);
                                const dir = encode(el.dataset.dir);
                                const path = encode(el.dataset.path);

                                const data = await getPathInfo(rootPath, dir, path);
                                repalceState(data, rootPath, dir, path);
                            } else {
                                const el = document.getElementById('goDir');
                                const rootPath = encode(el.dataset.rootPath);
                                const dir = encode(el.dataset.dir);
                                const path = encode(el.dataset.path);

                                const data = await getPathInfo(rootPath, dir, path);
                                repalceState(data, rootPath, dir, path);
                            }

                            return data; // 将数据传递下去（如果需要）
                        })
                        .catch(error => {
                            console.error('删除失败:', error);
                            Swal.showValidationMessage(`请求失败: ${error.message}`);
                        });
            }
        }).then((result) => {
            // result.isConfirmed 为 true 表示用户点击了“确认”且 preConfirm 成功 resolve
            // 如果 preConfirm 中 throw 了 error 或用户点击取消，这里不会执行成功逻辑
            if (result.isConfirmed) {
                // 如果需要在这里做额外的成功提示，可以取消注释
                // Swal.fire('删除成功', '', 'success');
                // 注意：原代码是在 success 回调里直接触发了翻页按钮，没有额外弹窗，所以这里通常留空
            }
        });
    }

    // 移动到000下最后一个文件夹后
    function moveDir(e, target) {
        Swal.fire({
            title: '移动',
            text: '确认移动该目录下的所有文件!',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '确认',
            cancelButtonText: '取消',
            confirmButtonColor: '#d33',
            width: outter === '1' ? '80%' : undefined,

            preConfirm: () => {
                const params = new URLSearchParams(window.location.search);

                const path = encode(params.get('path'));
                const dir = encode(params.get('dir'));
                let rootPath = encode(params.get('rootPath'));

                return fetch(`/comic/moveDir?path=${path}&dir=${dir}&rootPath=${rootPath}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('网络响应不正常');
                            }
                            return response.json();
                        })
                        .then(async (data) => {
                            if (document.querySelectorAll('.j-next').length > 0) {
                                const el = document.querySelector('.j-next');
                                const rootPath = encode(el.dataset.rootPath);
                                const dir = encode(el.dataset.dir);
                                const path = encode(el.dataset.path);

                                const data = await getPathInfo(rootPath, dir, path);
                                repalceState(data, rootPath, dir, path);
                            } else if (document.querySelectorAll('.j-pre').length > 0) {
                                const el = document.querySelector('.j-pre');
                                const rootPath = encode(el.dataset.rootPath);
                                const dir = encode(el.dataset.dir);
                                const path = encode(el.dataset.path);

                                const data = await getPathInfo(rootPath, dir, path);
                                repalceState(data, rootPath, dir, path);
                            } else {
                                const el = document.getElementById('goDir');
                                const rootPath = encode(el.dataset.rootPath);
                                const dir = encode(el.dataset.dir);
                                const path = encode(el.dataset.path);

                                const data = await getPathInfo(rootPath, dir, path);
                                repalceState(data, rootPath, dir, path);
                            }

                            return data;
                        })
                        .catch(error => {
                            console.error('删除失败:', error);
                            Swal.showValidationMessage(`请求失败: ${error.message}`);
                        });
            }
        }).then((result) => {
            if (result.isConfirmed) {
            }
        });
    }

    function pushState(data, rootPath, dir, path) {
        // 1. 更新浏览器地址栏 (关键！让用户觉得真的跳转了，且能后退)
        // 注意：这里不刷新页面，只是修改 URL
        const newUrl = `./pics.html?path=${path}&rootPath=${rootPath}&dir=${dir}`;
        window.history.pushState({
                data,
                rootPath,
                dir,
                path
            },
            '', newUrl);
    }

    function repalceState(data, rootPath, dir, path) {
        const newUrl = `./pics.html?path=${path}&rootPath=${rootPath}&dir=${dir}`;
        window.history.replaceState({
                data,
                rootPath,
                dir,
                path
            },
            '', newUrl);
    }

    // 渲染数据提出来，给 onpopstate 用
    function renderAllData(data, rootPath, dir, path) {
        currentRequestId++;

        // 第三步：此时 data 才是你真正想要的业务数据
        renderNavigation(data, rootPath, dir, path);

        let loadPromise = Promise.resolve(); // 默认给一个已完成的 Promise

        if (data.fileList && data.fileList.length > 0) {
            // 获取 Promise 对象，但不 await，直接赋值给变量
            loadPromise = startImageLoading(data.fileList, data.out, rootPath, dir, path);
        } else {
            document.getElementById('picList').innerHTML = '<div class="empty-tip">该目录下暂无图片</div>';
        }

        renderBottomNav(data, rootPath, dir);
        applyOutterStyle(data.out);

        if (path) {
            document.getElementsByTagName('title')[0].innerHTML = decode(path);
        } else {
            document.getElementsByTagName('title')[0].innerHTML = '图片';
        }
        document.getElementsByTagName('h1')[0].innerHTML = decode(path);

        // 关键：返回这个 Promise 给调用者
        // 如果调用者不 await，这个 Promise 就静静地在后台跑，不影响主线程
        // 如果调用者 await，就会等待图片加载完成
        return loadPromise;
    }

    async function getPathInfo(rootPath, dir, path) {
        // 第一步：立刻保存当前滚动位置
        const scrollPosition = window.scrollY;

        // 第二步：【关键】在离开当前页面前，更新当前历史记录的状态
        // 把刚才保存的 scroll 写入当前的 history.state
        const currentState = history.state || {};
        currentState.scrollPosition = scrollPosition; // 存入自定义字段

        // 使用 replaceState 更新当前这条记录（URL 不变，只改数据）
        history.replaceState(currentState, '', window.location.href);

        // 用来给 popstate 渲染数据
        // 显示加载状态（可选，提升体验）
        const picList = document.getElementById('picList');
        picList.innerHTML = '<div class="loading">加载中...</div>';

        // 第一步：等待网络请求完成，拿到 Response 对象
        const res = await fetch(`/comic/pic?path=${path}&dir=${dir}&rootPath=${rootPath}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

        // 【关键点】手动检查状态码（对应 .then 里的 if (!res.ok)）
        if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
        }
        // 第二步：手动解析 JSON（对应 return res.json()）
        // 注意：res.json() 本身也是异步的，所以通常也要 await！
        const data = await res.json();

        // 直接调用，忽略返回值 (不 await)
        // 页面会立即继续执行，用户立刻看到界面，图片后台加载
        renderAllData(data, rootPath, dir, path);

        return data;
    }

    // --- 分离：渲染顶部导航 ---
    function renderNavigation(data, rootPath, dir, path) {
        const parentName = getParentName(decode(dir));
        const parentPath = getParentPath(decode(dir));

        // 1. 获取模板元素
        const template = document.getElementById('tpl-dir-link');
        // 3. 克隆模板内容 (true 表示深度克隆，包含子元素)
        // content 是 DocumentFragment，包含 template 里的所有节点
        const clone = template.content.cloneNode(true);

        // 2. 计算数据 (你的逻辑保持不变)
        const goDir = clone.querySelector('.btn-go-dir');
        if (path) { // 计算 targetDir 和 targetPath
            // 目录按钮，等价后退。dir、path参数后退一级，也就是dir移到path
            let targetDir = '';
            let targetPath = '';
            if (dir) {
                targetPath = parentName;
                if (parentName !== parentPath) {
                    // 根下下...级目录
                    targetDir = parentPath;
                }
            }

            // 4. 在克隆体里查找元素并填入数据
            // 注意：要在 clone 里查，不要在 document 里查，因为还没上树
            goDir.id = 'goDir';
            goDir.href = 'javascript:void(0)';
            goDir.dataset.rootPath = rootPath;
            goDir.dataset.dir = encode(targetDir);
            goDir.dataset.path = encode(targetPath);
            goDir.setAttribute('lastPage', path);
            // 如果文字也要变：goDir.textContent = '返回上级';
        } else {
            goDir.remove();
        }

        const reversePics = clone.querySelector('.btn-reverse-pics');
        if (data.fileList && data.fileList.length > 0) {
            reversePics.id = 'reversePics';
            reversePics.href = 'javascript:void(0)';
            reversePics.dataset.action = 'reversePics';
        } else {
            reversePics.remove();
        }

        const moveDir = clone.querySelector('.btn-move-dir');
        if (data.fName && data.fName === '000') {
            moveDir.id = 'moveDir';
            moveDir.href = 'javascript:void(0)';
            moveDir.dataset.action = 'moveDir';
        } else {
            moveDir.remove();
        }

        const delDir = clone.querySelector('.btn-del-dir');
        delDir.id = 'delDir';
        delDir.href = 'javascript:void(0)';
        delDir.dataset.action = 'delDir';

        const jpreEl = clone.querySelector('.a-j-pre');
        const jpreBtn = clone.querySelector('.bt-j-pre');
        if (data.pre) {
            jpreEl.className = 'jump j-pre';
            jpreEl.href = 'javascript:void(0)';
            jpreEl.dataset.rootPath = rootPath;
            jpreEl.dataset.dir = dir;
            jpreEl.dataset.path = data.pre;
            jpreBtn.className = 'button mid pre';
        } else {
            jpreEl.remove();
        }

        const jnextEl = clone.querySelector('.a-j-next');
        const jnextBtn = clone.querySelector('.bt-j-next');
        if (data.next) {
            jnextEl.className = 'jump j-next';
            jnextEl.href = 'javascript:void(0)';
            jnextEl.dataset.rootPath = rootPath;
            jnextEl.dataset.dir = dir;
            jnextEl.dataset.path = data.next;
            jnextBtn.className = 'button mid next';
        } else {
            jnextEl.remove();
        }

        // 文件夹列表
        if (data.dirList && data.dirList.length > 0) {
            // 计算 targetDir 和 targetPath
            // dir、path参数前进一级，也就是path移到dir
            let targetDir = '';
            if (dir) {
                targetDir = dir + '%2f' + path;
            } else {
                targetDir = path;
            }

            // 3. 创建新标签 (使用全局的 document 创建)
            data.dirList.forEach(item => {
                const newSpanDiv = document.createElement('div');
                const newSpanA = document.createElement('a');
                newSpanA.className = 'name';
                newSpanA.dataset.rootPath = rootPath;
                newSpanA.dataset.dir = targetDir;
                newSpanA.dataset.path = item;
                newSpanA.textContent = item;
                newSpanA.href = 'javascript:void(0)';
                newSpanDiv.appendChild(newSpanA);
                // 4. 将新标签添加到 clone 里的父容器中
                clone.appendChild(newSpanDiv);
            });
        }

        // 5. 插入页面
        const container = document.getElementById('dirList');
        container.innerHTML = ''; // 清空
        container.appendChild(clone);
    }

    // --- 分离：渲染底部导航 ---
    function renderBottomNav(data, rootPath, dir) {
        const template = document.getElementById('tpl-dir2-link');
        const clone = template.content.cloneNode(true);
        const jpreEl = clone.querySelector('.a-j-pre');
        const jpreBtn = clone.querySelector('.bt-j-pre');
        const jnextEl = clone.querySelector('.a-j-next');
        const jnextBtn = clone.querySelector('.bt-j-next');

        if (data.pre) {
            jpreEl.className = 'jump j-pre';
            jpreEl.href = 'javascript:void(0)';
            jpreEl.dataset.rootPath = rootPath;
            jpreEl.dataset.dir = dir;
            jpreEl.dataset.path = data.pre;
            jpreBtn.className = 'button mid pre';
        } else {
            jpreEl.remove();
        }
        if (data.next) {
            jnextEl.className = 'jump j-next';
            jnextEl.href = 'javascript:void(0)';
            jnextEl.dataset.rootPath = rootPath;
            jnextEl.dataset.dir = dir;
            jnextEl.dataset.path = data.next;
            jnextBtn.className = 'button mid next';
        } else {
            jnextEl.remove();
        }
        const container = document.getElementById('dirList2');
        container.innerHTML = ''; // 清空
        container.appendChild(clone);
    }

    // --- 分离：应用样式 ---
    function applyOutterStyle(out) {
        if (out === '1') {
            document.querySelectorAll('#goDir, #delDir, #reversePics, #moveDir, #dirPath, .name').forEach(el => {
                el.classList.add('aOut');
            });
            document.querySelectorAll('.button').forEach(el => {
                el.classList.add('buttonOut');
            });
            window.outter = '1';
        }
    }

    // --- 核心：图片加载逻辑 (抽离出来，更清晰) ---
    function startImageLoading(allPaths, outFlag, rootPath, dir, path) {
        const batchSize = 6;
        let batchIndex = 0;
        let isLoading = false;
        const globalImageCache = {};
        let nextRenderIndex = 0;
        // 标记所有批次是否已发起并完成加载
        let allBatchesFinished = false;

        // 捕获当前的 Request ID，整个加载过程共享这个 ID
        const myRequestId = ++currentRequestId;

        const picList = document.getElementById('picList');
        if (!picList) return;
        picList.innerHTML = ''; // 清空之前的 loading 或旧图

        // 1. 创建并返回这个 Promise
        return new Promise((resolve) => {
            // 内部辅助函数：检查是否全部完成，如果是则 resolve
            function checkAndResolve() {
                if (allBatchesFinished &&
                    Object.keys(globalImageCache).length === 0 &&
                    nextRenderIndex >= allPaths.length) {

                    // 防止重复调用
                    if (!checkAndResolve._resolved) {
                        checkAndResolve._resolved = true;

                        resolve(); // 3. 通知外部：搞定了！
                    }
                }
            }

            // 按顺序渲染的辅助函数
            // 定义 renderInOrder 在 loadBatch 内部，让它能访问局部的 nextRenderIndex
            function renderInOrder() {
                // 循环检查：只要全局缓存里有 nextRenderIndex 对应的数据，就插入
                while (globalImageCache.hasOwnProperty(nextRenderIndex)) {
                    const item = globalImageCache[nextRenderIndex];
                    if (item) picList.appendChild(item);
                    // 处理完这个索引，清理缓存，指针后移
                    delete globalImageCache[nextRenderIndex];
                    nextRenderIndex++;
                }

                // 【新增检查】如果所有图片都加载完了（通过外部标志位判断），且缓存空了（都渲染了）
                // 所有批次都结束了
                // ✅ 核心逻辑：检查是否所有图片都已渲染完毕
                // 条件1：所有批次的网络请求都结束了 (allBatchesFinished)
                // 条件2：缓存里没有剩余图片了 (说明都取出来了)
                // 条件3：指针已经走到了数组末尾 (防御性检查)
                if (allBatchesFinished &&
                    Object.keys(globalImageCache).length === 0 &&
                    nextRenderIndex >= allPaths.length) {
                    // 确保只执行一次
                    initCotent();

                    // 渲染后检查是否结束
                    checkAndResolve();

                    // 可选：重置标志位，防止重复调用（虽然逻辑上不会重复进入这里）
                    allBatchesFinished = false;

                }
            }

            function loadBatch() {
                if (batchIndex >= allPaths.length || isLoading) return;

                // 再次检查 ID，防止在 setTimeout 期间用户切换了页面
                if (myRequestId !== currentRequestId) return;

                isLoading = true;
                const currentBatch = allPaths.slice(batchIndex, batchIndex + batchSize);
                let loadedCount = 0;
                const totalInThisBatch = currentBatch.length;

                if (totalInThisBatch === 0) {
                    isLoading = false;
                    checkAndResolve(); // 没图片也直接完成
                    return;
                }

                // 获取当前页面的 origin，用于构建绝对路径，防止相对路径解析歧义
                // const pageOrigin = window.location.origin;

                const currentDir = (dir) ? dir.replaceAll('%2f', '/') : '';
                const currentPath = (path) ? path.replaceAll('%2f', '/') : '';

                currentBatch.forEach((picPath, index) => {
                    // 计算全局绝对索引
                    const globalIndex = batchIndex + index;

                    const img = new Image();

                    // 路径构建逻辑简化
                    let relativePath = '/';
                    if (currentDir && currentPath) relativePath += `${currentDir}/${currentPath}/`;
                    else if (currentPath) relativePath += `${currentPath}/`;
                    relativePath += picPath;
                    relativePath = relativePath.startsWith('/') ? relativePath : '/' + relativePath;

                    // 规范化 URL
                    // 确保路径以 / 开头，然后拼接 origin 变成绝对路径
                    // 例如：http://localhost:8080/images/1.jpg
                    // 绝对路径能避免浏览器对相对路径的多次解析尝试
                    // let fullPath = pageOrigin + relativePath;
                    // 去除可能出现的双斜杠 (如 http://...//images)
                    let fullPath = fileMap + rootPath + relativePath.replace(/([^:]\/)\/+/g, '$1');

                    // --- 定义处理函数 (带指纹锁) ---
                    // 使用 fullPath 作为指纹，确保即使函数被调用多次，也是针对同一个资源
                    const processImage = (status) => {
                        // 🛑 核心拦截：如果 ID 不匹配，直接丢弃
                        if (myRequestId !== currentRequestId) return;
                        // 【指纹锁】检查是否已经处理过这个特定的 img 对象
                        if (img._processed) return;
                        img._processed = true;

                        if (status === 'load') {
                            // 避免使用对资源类型对象使用包装
                            // let $img = $(img); $img.addClass(...); $container.append($img);
                            // jquery包装img，造成图片2次请求
                            // 只有当图片已经存在于 HTML 中，或者已经通过上面的步骤成功插入到页面后
                            // 再去 $('img') 选中它做动画、事件绑定等操作，才是安全的。
                            const container = document.createElement('div');
                            container.className = 'img-container';

                            const overlay = document.createElement('div');
                            overlay.className = 'overlay';
                            overlay.textContent = '删除';
                            container.appendChild(overlay);

                            if (outFlag === '1') img.classList.add('picOut');
                            container.appendChild(img);

                            globalImageCache[globalIndex] = container;
                        } else {
                            console.warn('图片加载失败:', picPath);
                            globalImageCache[globalIndex] = null;
                        }

                        loadedCount++;

                        // 当本批次所有图片都尝试加载完毕后，尝试渲染
                        if (loadedCount === totalInThisBatch) {
                            // 再次检查，防止最后一张图加载完时用户刚好切换了
                            if (myRequestId !== currentRequestId) {
                                isLoading = false;
                                return;
                            }
                            renderInOrder();
                            isLoading = false;
                            batchIndex += batchSize;

                            if (batchIndex < allPaths.length) {
                                setTimeout(loadBatch, 50);
                            } else {
                                // ✅ 修改：不再直接调用 initCotent()
                                // 而是标记“所有批次已结束”，然后尝试渲染
                                // 剩下的交给 renderInOrder 里的判断逻辑去收尾
                                allBatchesFinished = true;
                                renderInOrder();
                            }
                        }
                    };

                    img.onload = () => processImage('load');
                    img.onerror = () => processImage('error');
                    img.src = fullPath;
                });
            }

            loadBatch();
        });
    }

    // 目录切换
    async function openDir() {
        // 1. 【🛑 立即让旧任务失效】
        // 只要这个值变了，上面所有正在加载的 img 的回调都会发现 ID 不匹配，从而自动停止工作
        currentRequestId++;

        const val = encode(document.getElementById('dirPath').value);
        const data = await getPathInfo(val, '', '');
        pushState(data, val, '', '');
    }

    // 初始化页面
    document.addEventListener('DOMContentLoaded', async function () {
        const params = new URLSearchParams(window.location.search);
        const path = encode(params.get('path'));
        const dir = encode(params.get('dir'));
        let rootPath = encode(params.get('rootPath'));
        if (rootPath) {
            rootPath = rootPath.replaceAll('/', '\\');
            document.getElementById('dirPath').value = decode(rootPath);
        } else {
            document.getElementById('dirPath').value = 'pics';
            rootPath = 'pics';
        }
        if (path) {
            document.getElementsByTagName('title')[0].innerHTML = decode(path);
        } else {
        }
        document.getElementsByTagName('h1')[0].innerHTML = decode(path);
        document.getElementById('dirPath').addEventListener('change', openDir);

        const targetRootPath = encode(rootPath);
        const data = await getPathInfo(targetRootPath, dir, path);
        pushState(data, targetRootPath, dir, path);
    })

    // 元素是否可见
    function isVisible(element) {
        if (!element) return false;

        // 1. 检查 display: none
        if (window.getComputedStyle(element).display === 'none') {
            return false;
        }

        // 2. 检查 visibility: hidden
        if (window.getComputedStyle(element).visibility === 'hidden') {
            return false;
        }

        // 3. 检查 opacity: 0 (针对淡入淡出场景很重要)
        if (parseFloat(window.getComputedStyle(element).opacity) === 0) {
            return false;
        }

        // 4. 检查元素是否有宽高 (防止虽然设置了 display:block 但内容为空导致不可见)
        const rect = element.getBoundingClientRect();
        if (rect.width === 0 && rect.height === 0) {
            return false;
        }

        return true;
    }

    // 图片加载后的方法
    function initCotent() {
        function showEl(e) {
            const overlay = e.currentTarget.querySelector('.overlay');
            if (canDown) {
                timer = setTimeout(function () {
                    canDown = false;
                    // 确保先移除“彻底隐藏”的类（如果有）
                    overlay.classList.remove('is-hidden-final');

                    // 强制重绘 (可选，防止刚移除类就添加导致动画不触发)
                    void overlay.offsetWidth;

                    // 添加可见类，触发 CSS transition
                    overlay.classList.add('is-visible');
                    canUp = true;
                }, 700)
            }

        }

        function hideEL(e) {
            const overlay = e.currentTarget.querySelector('.overlay');
            if (canUp && !canDown) {
                canUp = false;
                setTimeout(function () {
                    // 1. 移除可见类，开始淡出动画 (opacity 1 -> 0, visibility visible -> hidden)
                    overlay.classList.remove('is-visible');

                    // 2. 监听动画结束，彻底设为 display: none (模拟 jQuery 行为)
                    // 使用 { once: true } 自动移除监听器，防止内存泄漏
                    overlay.addEventListener('transitionend', function() {
                        overlay.classList.add('is-hidden-final'); // 加上这个类后，display 变为 none
                    }, { once: true });

                    canDown = true;
                }, 2300)
            }

            clearTimeout(timer);
        }

        // 长按图片能删除图片
        document.querySelectorAll('.img-container').forEach(el => {
            el.removeEventListener('mousedown', showEl );
            el.addEventListener('mousedown', showEl);
            el.removeEventListener('mouseup', hideEL);
            el.addEventListener('mouseup', hideEL);
            // 3. 【必须修改】加上这个，防止鼠标拖出去导致无法隐藏
            el.addEventListener('mouseleave', hideEL);
            el.removeEventListener('touchstart', showEl);
            el.addEventListener('touchstart', showEl);
            el.removeEventListener('touchend', hideEL);
            el.addEventListener('touchend', hideEL);
        });

        function delThisPic(e) {
            const src = encode(e.currentTarget.nextElementSibling.getAttribute('src'));
            const parentNode = e.currentTarget.parentNode;

            Swal.fire({
                title: '删除',
                text: '确认删除该图片!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '确认',
                cancelButtonText: '取消',
                confirmButtonColor: '#d33',
                width: outter === '1' ? '80%' : undefined,

                preConfirm: () => {
                    const params = new URLSearchParams(window.location.search);
                    let rootPath = encode(params.get('rootPath'));

                    return fetch(`/comic/deletePic?loc=${src}&rootPath=${encode(rootPath)}`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json'
                            }
                        })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('网络响应不正常');
                            }
                            return response.json();
                        })
                        .then(data => {
                            if (data.ok && data.ok === '1') {
                                parentNode.remove();
                            }
                            return data;
                        })
                        .catch(error => {
                            console.error('删除失败:', error);
                            Swal.showValidationMessage(`请求失败: ${error.message}`);
                        });
                }
            }).then((result) => {
                if (result.isConfirmed) {
                }
            });

        }

        // 删除图片
        document.querySelectorAll('.overlay').forEach(el => {
            el.removeEventListener('click', delThisPic);
            el.addEventListener('click', delThisPic);
        });
    }

    // 拦截所有内部链接点击 (事件委托)
    document.addEventListener('click', async function(e) {
        // 找到最近的 a 标签
        const link = e.target.closest('a');

        // 如果是内部跳转链接
        if (link && !link.dataset.action) {
            e.preventDefault(); // 阻止浏览器默认跳转

            // 从 href 或 data 属性中提取参数
            const rootPath = encode(link.dataset.rootPath);
            const dir = encode(link.dataset.dir);
            const path = encode(link.dataset.path);

            // 调用我们的无刷新加载函数
            const data = await getPathInfo(rootPath, dir, path);
            pushState(data, rootPath, dir, path);
            return;
        }

        // 1. 找到被点击的元素（或者它的父级，防止点到图标上）
        const target = e.target.closest('[data-action]');

        // 如果没有 data-action 属性，直接忽略（比如点到了空白处）
        if (!target) return;

        // 2. 阻止默认行为（如果是链接或表单提交）
        // 注意：有些操作可能不需要阻止默认行为，视情况而定
        if (target.tagName === 'A' || target.tagName === 'BUTTON') {
            e.preventDefault();
        }

        // 3. 获取动作类型
        const action = target.dataset.action;

        // 4. 分发到对应函数 (像交换机一样)
        switch (action) {
            case 'reversePics':
                reversePics(e, target);
                break;
            case 'moveDir':
                moveDir(e, target);
                break;
            case 'delDir':
                delDir(e, target);
                break;

            default:
                console.warn('未知的动作:', action);
        }
    });

    // 处理浏览器的“后退/前进”按钮
    window.onpopstate = async function(event) {
        if (event.state) {
            // 直接从缓存拿数据，不用手动更新数据
            // 这里加上 await
            // 代码会暂停在这里，直到 renderAllData 返回的 Promise resolve
            // 也就是直到所有图片加载完、initCotent 执行完
            await renderAllData(event.state.data, event.state.rootPath, event.state.dir, event.state.path);
        } else {
            // 初始状态，加载根目录
            await getPathInfo(encode('pics'), '', '');
        }

        // 滚轮到之前位置
        const targetScroll = event.state.scrollPosition;
        const images = document.querySelectorAll('img');

        // 如果没有图片，直接滚
        if (images.length === 0) {
            window.scrollTo(0, targetScroll);
            return;
        }

        // 防御性检查，智能等待：收集所有未加载完成的图片
        const promises = Array.from(images).map(img => {
            if (img.complete) return Promise.resolve(); // 已缓存，直接通过

            return new Promise(resolve => {
                img.onload = resolve;
                img.onerror = resolve; // 即使报错也继续，防止卡死
            });
        });

        // 等所有图片搞定后，立即滚动（无需固定等待时间）
        Promise.all(promises).then(() => {
            // 加一个极短的延迟确保浏览器重绘
            requestAnimationFrame(() => {
                window.scrollTo(0, targetScroll);
            });
        });
    };

</script>
